<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FaceFind — Starting...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,800&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f9f7f4;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      -webkit-font-smoothing: antialiased;
    }
    .logo {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 22px;
      font-weight: 800;
      color: #4f46e5;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e8e3db;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    p { font-size: 14px; color: #78716c; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
      <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
      <circle cx="12" cy="10" r="3"/><path d="M9 16c0-1.7 1.3-3 3-3s3 1.3 3 3"/>
    </svg>
    FaceFind
  </div>
  <div class="spinner"></div>
  <p>Signing you in...</p>

  <script>
    (async () => {
      try {
        const r = await fetch('/api/auth/autologin', { credentials: 'include' });
        if (r.ok) {
          window.location.replace('/admin.html');
        } else {
          window.location.replace('/login.html');
        }
      } catch {
        window.location.replace('/login.html');
      }
    })();
  </script>
</body>
</html>
