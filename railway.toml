[build]
dockerfile = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Environment variables ─────────────────────────────────────────────────────
# Set these in the Railway dashboard → Variables tab.
#
# Required (Postgres + auth):
#   DATABASE_URL          — set automatically by the Railway Postgres plugin
#   GMAIL_CLIENT_ID
#   GMAIL_CLIENT_SECRET
#   GMAIL_REFRESH_TOKEN
#   ADMIN_SECRET
#   RAZORPAY_KEY_ID
#   RAZORPAY_KEY_SECRET
#
# Required (Backblaze B2 — bulk storage):
#   B2_KEY_ID             — Backblaze application key ID
#   B2_APPLICATION_KEY    — Backblaze application key (secret)
#   B2_BUCKET_NAME        — e.g. facefind-photos
#   B2_REGION             — e.g. us-west-004  (check your bucket's region)
#
# Optional:
#   REDIS_URL             — Redis connection string (caching disabled if absent)
#   GOOGLE_API_KEY        — Google Drive API key for folder listing
#   INSIGHTFACE_MODEL     — default: buffalo_sc
#   DET_SIZE              — face detection size in px (default: 320)
#   UNLOAD_MODEL_AFTER_EMBED — default: true
#   MAX_LOADED_INDEXES    — default: 2
#   DATA_DIR              — local scratch dir (default: /data)
#                           Only lightweight temp files live here now;
#                           all bulk data goes to B2.