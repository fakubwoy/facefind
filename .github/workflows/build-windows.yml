name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - selfhosted

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: selfhosted

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Write launcher script
        shell: python
        run: |
          code = r'''
          import os, sys, json, time, hashlib, threading, webbrowser, urllib.request, urllib.error
          from pathlib import Path
          from http.server import HTTPServer, BaseHTTPRequestHandler

          VALIDATION_URL  = "https://facefind-production.up.railway.app/api/license/validate"
          USER_INFO_URL   = "https://facefind-production.up.railway.app/api/license/userinfo"
          PORT            = int(os.environ.get("PORT", 8000))
          ACTIVATE_PORT   = PORT + 1

          if getattr(sys, "frozen", False):
              BASE_DIR = Path(sys.executable).parent
              BUNDLE   = Path(sys._MEIPASS)
          else:
              BASE_DIR = Path(__file__).parent
              BUNDLE   = BASE_DIR

          KEY_FILE        = BASE_DIR / ".license_key"
          MACHINE_ID_FILE = BASE_DIR / ".machine_id"
          DATA_DIR        = BASE_DIR / "data"

          # Shared state set before uvicorn starts
          _license_data = {}

          def get_machine_id():
              if MACHINE_ID_FILE.exists():
                  return MACHINE_ID_FILE.read_text().strip()
              import uuid
              mid = hashlib.sha256(str(uuid.getnode()).encode()).hexdigest()[:32]
              MACHINE_ID_FILE.write_text(mid)
              return mid

          def validate_key(key, machine_id):
              payload = json.dumps({"key": key, "machine_id": machine_id}).encode()
              req = urllib.request.Request(
                  VALIDATION_URL, data=payload,
                  headers={"Content-Type": "application/json"}, method="POST"
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      return json.loads(resp.read()), None
              except urllib.error.HTTPError as e:
                  try:
                      body = json.loads(e.read())
                      reason = body.get("reason") or body.get("detail") or str(e)
                  except Exception:
                      reason = str(e)
                  return None, reason
              except Exception as e:
                  return None, str(e)

          def fetch_user_info(key):
              """Fetch the user account linked to this license key from Railway."""
              try:
                  payload = json.dumps({"key": key}).encode()
                  req = urllib.request.Request(
                      USER_INFO_URL, data=payload,
                      headers={"Content-Type": "application/json"}, method="POST"
                  )
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      return json.loads(resp.read())
              except Exception:
                  return None

          # ── Activation server ─────────────────────────────────────────────────

          _activation_done   = threading.Event()
          _activation_result = {}
          ACTIVATE_HTML_PATH = BUNDLE / "activate.html"

          class ActivationHandler(BaseHTTPRequestHandler):
              def log_message(self, fmt, *args):
                  pass

              def _json(self, code, data):
                  body = json.dumps(data).encode()
                  self.send_response(code)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.send_header("Access-Control-Allow-Origin", "*")
                  self.end_headers()
                  self.wfile.write(body)

              def do_OPTIONS(self):
                  self.send_response(204)
                  self.send_header("Access-Control-Allow-Origin", "*")
                  self.send_header("Access-Control-Allow-Methods", "GET, POST, OPTIONS")
                  self.send_header("Access-Control-Allow-Headers", "Content-Type")
                  self.end_headers()

              def do_GET(self):
                  if self.path in ("/", "/activate", "/activate/"):
                      html = ACTIVATE_HTML_PATH.read_bytes()
                      self.send_response(200)
                      self.send_header("Content-Type", "text/html; charset=utf-8")
                      self.send_header("Content-Length", str(len(html)))
                      self.end_headers()
                      self.wfile.write(html)
                  elif self.path == "/activate/machine-id":
                      self._json(200, {"machine_id": get_machine_id()})
                  else:
                      self._json(404, {"detail": "not found"})

              def do_POST(self):
                  if self.path == "/activate/validate":
                      length = int(self.headers.get("Content-Length", 0))
                      body   = json.loads(self.rfile.read(length))
                      key    = body.get("key", "").strip().upper()
                      mid    = get_machine_id()
                      data, error = validate_key(key, mid)
                      if data and data.get("valid"):
                          KEY_FILE.write_text(key)
                          _activation_result["key"]  = key
                          _activation_result["plan"] = data.get("plan", "unknown")
                          self._json(200, {"ok": True, "plan": data.get("plan", "unknown")})
                          threading.Timer(3.5, _activation_done.set).start()
                      elif error and KEY_FILE.exists():
                          _activation_result["key"] = KEY_FILE.read_text().strip()
                          self._json(200, {"ok": True, "plan": "offline"})
                          threading.Timer(3.5, _activation_done.set).start()
                      else:
                          reason = error or (data.get("reason") if data else "Unknown error")
                          self._json(403, {"reason": reason})
                  else:
                      self._json(404, {"detail": "not found"})

          def run_activation_server():
              server = HTTPServer(("127.0.0.1", ACTIVATE_PORT), ActivationHandler)
              server.timeout = 1
              while not _activation_done.is_set():
                  server.handle_request()
              server.server_close()

          # ── Auto-login: seed local DB with user from Railway ──────────────────

          def setup_autologin(key, plan):
              """
              Fetch the account linked to this license key from Railway, create it
              locally if needed, and write the session token into app._autologin_token
              so the browser auto-logs in without ever seeing the login page.
              """
              import sys
              sys.path.insert(0, str(BUNDLE / "backend"))
              import app as facefind_app
              import hashlib, secrets, time as t, uuid

              # DB tables must exist before we touch them — init_db is idempotent
              facefind_app.init_db()

              user_info = fetch_user_info(key)

              if user_info and user_info.get("email"):
                  email = user_info["email"].lower()
                  name  = user_info.get("name") or email.split("@")[0]
              else:
                  # Offline fallback: use a stable local account derived from machine ID
                  mid   = get_machine_id()
                  email = f"local-{mid[:8]}@selfhosted.local"
                  name  = "Local User"

              # Create or update the user in local SQLite
              existing = facefind_app.db_get_user_by_email(email)
              if not existing:
                  pw = hashlib.sha256(get_machine_id().encode()).hexdigest()
                  facefind_app.db_create_user(email, name, pw, email_verified=True)
                  existing = facefind_app.db_get_user_by_email(email)

              # Update plan to match license
              with facefind_app.get_db() as conn:
                  with conn.cursor() as cur:
                      cur.execute("UPDATE users SET plan=?, email_verified=1 WHERE email=?", (plan, email))
                  conn.commit()

              # Create session
              token = facefind_app.db_create_session(existing["id"])
              facefind_app._autologin_token = token
              print(f"Auto-login ready for {email} (plan: {plan})")
              return token

          # ── Open browser to admin once server is up ───────────────────────────

          def open_browser_when_ready(token):
              """Poll until the server is up then open directly to admin."""
              for _ in range(30):
                  time.sleep(1)
                  try:
                      req = urllib.request.Request(f"http://localhost:{PORT}/api/health")
                      with urllib.request.urlopen(req, timeout=2):
                          pass
                      # Server is up — set cookie via autologin then go to admin
                      webbrowser.open(f"http://localhost:{PORT}/autologin.html")
                      return
                  except Exception:
                      continue

          # ── Main ─────────────────────────────────────────────────────────────

          def launch_main_app():
              os.environ["DATA_DIR"]     = str(DATA_DIR)
              os.environ["FRONTEND_DIR"] = str(BUNDLE / "frontend")
              sys.path.insert(0, str(BUNDLE / "backend"))
              print(f"Starting FaceFind at http://localhost:{PORT}")
              print("Press Ctrl+C to stop.")
              import uvicorn
              uvicorn.run("app:app", host="0.0.0.0", port=PORT, log_level="warning")

          def main():
              print("FaceFind Self-Hosted")
              print("-------------------------------------")

              DATA_DIR.mkdir(parents=True, exist_ok=True)

              saved_key = KEY_FILE.read_text().strip() if KEY_FILE.exists() else ""
              validated_plan = None

              if saved_key:
                  print("Checking license...")
                  mid = get_machine_id()
                  data, error = validate_key(saved_key, mid)
                  if data and data.get("valid"):
                      validated_plan = data.get("plan", "unknown")
                      print(f"License valid - Plan: {validated_plan}")
                  elif error:
                      print(f"Could not reach license server ({error})")
                      print("Running in offline mode using saved license.")
                      validated_plan = "offline"
                  else:
                      print("Saved license key is no longer valid. Launching activation...")
                      KEY_FILE.unlink(missing_ok=True)
                      saved_key = ""

              if not saved_key:
                  print(f"Opening activation page at http://localhost:{ACTIVATE_PORT}")
                  print("Complete activation in your browser to continue.")
                  t = threading.Thread(target=run_activation_server, daemon=True)
                  t.start()
                  threading.Timer(1.0, lambda: webbrowser.open(f"http://localhost:{ACTIVATE_PORT}")).start()
                  _activation_done.wait()
                  t.join(timeout=2)
                  saved_key    = _activation_result.get("key", "")
                  validated_plan = _activation_result.get("plan", "unknown")
                  print(f"Activation complete - Plan: {validated_plan}")

              # Set up auto-login before uvicorn starts so _autologin_token is ready
              if saved_key and validated_plan and validated_plan != "offline":
                  try:
                      token = setup_autologin(saved_key, validated_plan)
                      threading.Thread(
                          target=open_browser_when_ready, args=(token,), daemon=True
                      ).start()
                  except Exception as e:
                      print(f"Auto-login setup failed ({e}), opening login page instead.")
                      threading.Timer(4.0, lambda: webbrowser.open(f"http://localhost:{PORT}")).start()
              else:
                  threading.Timer(4.0, lambda: webbrowser.open(f"http://localhost:{PORT}")).start()

              launch_main_app()

          if __name__ == "__main__":
              main()
          '''
          with open("facefind_launcher.py", "w", encoding="utf-8") as f:
              f.write(code)

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --name "FaceFind" `
            --add-data "frontend;frontend" `
            --add-data "backend/app.py;backend" `
            --add-data "activate.html;." `
            --add-data "autologin.html;frontend" `
            --hidden-import "uvicorn.logging" `
            --hidden-import "uvicorn.loops" `
            --hidden-import "uvicorn.loops.auto" `
            --hidden-import "uvicorn.protocols" `
            --hidden-import "uvicorn.protocols.http" `
            --hidden-import "uvicorn.protocols.http.auto" `
            --hidden-import "uvicorn.protocols.websockets.auto" `
            --hidden-import "uvicorn.lifespan" `
            --hidden-import "uvicorn.lifespan.on" `
            --hidden-import "fastapi" `
            --hidden-import "fastapi.middleware" `
            --hidden-import "fastapi.middleware.cors" `
            --hidden-import "fastapi.middleware.trustedhost" `
            --hidden-import "fastapi.middleware.gzip" `
            --hidden-import "fastapi.staticfiles" `
            --hidden-import "fastapi.responses" `
            --hidden-import "fastapi.background" `
            --hidden-import "starlette.middleware" `
            --hidden-import "starlette.middleware.cors" `
            --hidden-import "starlette.middleware.base" `
            --hidden-import "starlette.middleware.trustedhost" `
            --hidden-import "starlette.staticfiles" `
            --hidden-import "starlette.responses" `
            --hidden-import "starlette.background" `
            --hidden-import "starlette.routing" `
            --hidden-import "insightface" `
            --hidden-import "insightface.app" `
            --hidden-import "insightface.model_zoo" `
            --hidden-import "faiss" `
            --hidden-import "cv2" `
            --hidden-import "numpy" `
            --hidden-import "multipart" `
            --hidden-import "email" `
            --hidden-import "email.mime" `
            --hidden-import "email.mime.text" `
            --hidden-import "email.mime.multipart" `
            --hidden-import "email.mime.base" `
            --hidden-import "email.message" `
            --hidden-import "email.generator" `
            --hidden-import "email.parser" `
            --hidden-import "email.header" `
            --hidden-import "smtplib" `
            --hidden-import "requests" `
            --hidden-import "requests.adapters" `
            --hidden-import "requests.auth" `
            --hidden-import "urllib.request" `
            --hidden-import "urllib.parse" `
            --hidden-import "urllib.error" `
            --hidden-import "gdown" `
            --hidden-import "sqlite3" `
            --collect-all "insightface" `
            --collect-all "onnxruntime" `
            --collect-all "fastapi" `
            --collect-all "starlette" `
            --clean `
            --noconfirm `
            facefind_launcher.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: FaceFind-Windows
          path: dist/FaceFind.exe
          retention-days: 30