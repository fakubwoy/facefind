name: Build Windows Executable

on:
  push:
    branches:
      - selfhosted      # fires on every push to this branch
  workflow_dispatch:   # Allow manual trigger from GitHub UI
    inputs:
      version:
        description: 'Version label (e.g. 1.0.0)'
        required: false
        default: 'dev'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install build dependencies ────────────────────────────────────────
      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install pyinstaller==6.10.0

          # Core runtime dependencies
          pip install `
            fastapi==0.115.0 `
            uvicorn[standard]==0.30.6 `
            python-multipart==0.0.9 `
            requests==2.32.3 `
            numpy==1.26.4 `
            opencv-python-headless==4.10.0.84 `
            Pillow==10.4.0 `
            qrcode[pil]==7.4.2 `
            insightface==0.7.3 `
            onnxruntime==1.19.2 `
            faiss-cpu==1.8.0.post1

      # ── 4. Download InsightFace model weights ────────────────────────────────
      - name: Cache InsightFace models
        uses: actions/cache@v4
        id: model-cache
        with:
          path: ~/.insightface/models
          key: insightface-buffalo_sc-v1

      - name: Download InsightFace buffalo_sc model
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          python -c "
          from insightface.app import FaceAnalysis
          model = FaceAnalysis(name='buffalo_sc', providers=['CPUExecutionProvider'])
          model.prepare(ctx_id=-1, det_size=(320, 320))
          print('Model downloaded and ready.')
          "

      # ── 5. Copy frontend files into build folder ─────────────────────────────
      # activate.html is already inside frontend/ in your repo
      # pricing.html and download.html are excluded from the local build
      - name: Prepare frontend directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build_staging\frontend
          # Copy all HTML pages except pricing and download
          $exclude = @('pricing.html', 'download.html')
          Get-ChildItem -Path frontend\*.html |
            Where-Object { $_.Name -notin $exclude } |
            ForEach-Object { Copy-Item $_.FullName build_staging\frontend\ }
          # Copy local_patch.js from repo root into the frontend bundle
          if (Test-Path local_patch.js) {
            Copy-Item local_patch.js build_staging\frontend\local_patch.js
          }
          # Copy any static assets (css/, js/, images/, etc.)
          if (Test-Path frontend\static) {
            Copy-Item -Recurse frontend\static build_staging\frontend\static
          }
          if (Test-Path frontend\assets) {
            Copy-Item -Recurse frontend\assets build_staging\frontend\assets
          }
          Write-Host "Frontend files staged:"
          Get-ChildItem build_staging\frontend

      # ── 6. Write PyInstaller spec ─────────────────────────────────────────────
      - name: Write PyInstaller spec file
        shell: pwsh
        run: |
          $USERPROFILE = [System.Environment]::GetFolderPath('UserProfile')
          $modelPath = "$USERPROFILE\.insightface\models\buffalo_sc"
          $specContent = @"
          # -*- mode: python ; coding: utf-8 -*-
          import sys, os
          from pathlib import Path

          block_cipher = None

          model_src = r'$modelPath'
          model_dst = os.path.join('.insightface', 'models', 'buffalo_sc')

          a = Analysis(
              ['app_local.py'],
              pathex=[],
              binaries=[],
              datas=[
                  ('build_staging/frontend', 'frontend'),
                  (model_src, model_dst),
              ],
              hiddenimports=[
                  'uvicorn.logging',
                  'uvicorn.loops',
                  'uvicorn.loops.auto',
                  'uvicorn.protocols',
                  'uvicorn.protocols.http',
                  'uvicorn.protocols.http.auto',
                  'uvicorn.protocols.websockets',
                  'uvicorn.protocols.websockets.auto',
                  'uvicorn.lifespan',
                  'uvicorn.lifespan.on',
                  'fastapi',
                  'starlette',
                  'anyio',
                  'insightface',
                  'insightface.app',
                  'onnxruntime',
                  'faiss',
                  'cv2',
                  'numpy',
                  'PIL',
                  'qrcode',
                  'sqlite3',
              ],
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=['tkinter', 'matplotlib', 'scipy', 'pandas', 'psycopg2', 'redis', 'b2sdk'],
              win_no_prefer_redirects=False,
              win_private_assemblies=False,
              cipher=block_cipher,
              noarchive=False,
          )

          pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)

          exe = EXE(
              pyz,
              a.scripts,
              [],
              exclude_binaries=True,
              name='Lenstagram',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=True,
              console=False,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
              icon='frontend/assets/icon.ico' if os.path.exists('frontend/assets/icon.ico') else None,
          )

          coll = COLLECT(
              exe,
              a.binaries,
              a.zipfiles,
              a.datas,
              strip=False,
              upx=True,
              upx_exclude=[],
              name='Lenstagram',
          )
          "@
          $specContent | Out-File -FilePath lenstagram.spec -Encoding UTF8

      # ── 7. Build the executable ───────────────────────────────────────────────
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller lenstagram.spec --clean --noconfirm
          Write-Host "Build complete. Output:"
          Get-ChildItem dist\Lenstagram\ | Select-Object Name, Length | Format-Table

      # ── 8. Verify the build ───────────────────────────────────────────────────
      - name: Verify executable exists
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\Lenstagram\Lenstagram.exe")) {
            Write-Error "Build failed: Lenstagram.exe not found!"
            exit 1
          }
          $size = (Get-Item "dist\Lenstagram\Lenstagram.exe").Length / 1MB
          Write-Host "Lenstagram.exe size: $([math]::Round($size, 1)) MB"

      # ── 9. Package into ZIP ───────────────────────────────────────────────────
      - name: Create release ZIP
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          } else {
            $version = "v${{ github.event.inputs.version || 'dev' }}"
          }

          $readmeContent = @"
          Lenstagram Desktop — $version
          ==============================

          INSTALLATION
          1. Extract this ZIP to a folder of your choice.
          2. Run Lenstagram.exe
          3. On first launch, enter your license key from:
             https://lenstagram.app/download.html
          4. The app opens in your browser at http://localhost:8765

          REQUIREMENTS
          - Windows 10 or later (64-bit)
          - Internet connection required for first activation
          - After activation, works offline within your plan's grace period

          SUPPORT
          support@lenstagram.app
          "@
          $readmeContent | Out-File "dist\Lenstagram\README.txt" -Encoding UTF8

          $zipName = "Lenstagram-Desktop-Windows-$version.zip"
          Compress-Archive -Path "dist\Lenstagram\*" -DestinationPath $zipName -Force
          Write-Host "Package created: $zipName"
          $zipSize = (Get-Item $zipName).Length / 1MB
          Write-Host "ZIP size: $([math]::Round($zipSize, 1)) MB"
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          echo "VERSION=$version" >> $env:GITHUB_ENV

      # ── 10. Upload artifact (available under Actions → run → Artifacts) ───────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lenstagram-desktop-windows
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      # ── 11. Create GitHub Release (on tag push only) ──────────────────────────
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: "Lenstagram Desktop ${{ env.VERSION }}"
          body: |
            ## Lenstagram Desktop ${{ env.VERSION }}

            ### Installation
            1. Download and extract `Lenstagram-Desktop-Windows-${{ env.VERSION }}.zip`
            2. Run `Lenstagram.exe`
            3. Enter your license key on first launch (get it from your [dashboard](https://lenstagram.app/download.html))

            ### Requirements
            - Windows 10 or later (64-bit)
            - Internet required for first activation; then works offline within grace period
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}